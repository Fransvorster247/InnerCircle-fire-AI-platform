version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: innercircle-postgres
    environment:
      POSTGRES_USER: innercircle
      POSTGRES_PASSWORD: innercircle_dev
      POSTGRES_DB: innercircle_fire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innercircle"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: innercircle-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: innercircle-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://innercircle:innercircle_dev@postgres:5432/innercircle_fire
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    env_file:
      - .env

volumes:
  postgres_data:

networks:
  default:
    name: innercircle-network
