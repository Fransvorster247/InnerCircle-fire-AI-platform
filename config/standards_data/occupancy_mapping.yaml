# Building Occupancy Classification (SANS 10400-T)
# Maps occupancy classes A1-H4 to fire safety requirements

occupancy_classes:
  - code: "A1"
    description: "Residential - Low Risk (Houses, flats < 2 stories)"
    life_safety_risk: "LOW"
    occupancy_load_factor: 30  # m² per person
    mandatory_systems:
      - "Manual Fire Alarm"
      - "Emergency Lighting"
      - "Fire Safety Signage"
    optional_systems:
      - "Automatic Sprinklers"
    fire_resistance_rating: "30 minutes"
    max_travel_distance: 45  # meters
    escape_route_width: 0.9  # meters

  - code: "A2"
    description: "Residential - Medium Risk (Multi-story residential, hotels)"
    life_safety_risk: "MEDIUM"
    occupancy_load_factor: 20
    mandatory_systems:
      - "Automatic Fire Detection"
      - "Manual Fire Alarm"
      - "Voice Alarm"
      - "Emergency Lighting"
      - "Fire Safety Signage"
      - "Fire Extinguishers"
    optional_systems:
      - "Automatic Sprinklers"
    fire_resistance_rating: "60 minutes"
    max_travel_distance: 40
    escape_route_width: 1.1

  - code: "A3"
    description: "Residential - High Risk (High-rise residential)"
    life_safety_risk: "HIGH"
    occupancy_load_factor: 15
    mandatory_systems:
      - "Automatic Fire Detection"
      - "Manual Fire Alarm"
      - "Voice Alarm"
      - "Automatic Sprinklers"
      - "Emergency Lighting"
      - "Fire Safety Signage"
      - "Fire Extinguishers"
      - "Refuge Areas"
    optional_systems: []
    fire_resistance_rating: "90 minutes"
    max_travel_distance: 35
    escape_route_width: 1.2

  - code: "B"
    description: "Commercial & Office Buildings"
    life_safety_risk: "MEDIUM"
    occupancy_load_factor: 10
    mandatory_systems:
      - "Automatic Fire Detection"
      - "Manual Fire Alarm"
      - "Emergency Lighting"
      - "Fire Safety Signage"
      - "Fire Extinguishers"
    optional_systems:
      - "Automatic Sprinklers"
    fire_resistance_rating: "60 minutes"
    max_travel_distance: 40
    escape_route_width: 1.1

  - code: "C"
    description: "Assembly Spaces (Theatres, cinemas, conference halls)"
    life_safety_risk: "HIGH"
    occupancy_load_factor: 0.5
    mandatory_systems:
      - "Automatic Fire Detection"
      - "Manual Fire Alarm"
      - "Voice Alarm"
      - "Emergency Lighting"
      - "Fire Safety Signage"
      - "Fire Extinguishers"
      - "Automatic Sprinklers"
    optional_systems: []
    fire_resistance_rating: "90 minutes"
    max_travel_distance: 30
    escape_route_width: 1.5

  - code: "D"
    description: "Healthcare Facilities (Hospitals, clinics, care homes)"
    life_safety_risk: "CRITICAL"
    occupancy_load_factor: 20
    mandatory_systems:
      - "Automatic Fire Detection"
      - "Manual Fire Alarm"
      - "Voice Alarm"
      - "Automatic Sprinklers"
      - "Emergency Lighting"
      - "Fire Safety Signage"
      - "Fire Extinguishers"
      - "Gas Suppression (ICU/OR)"
      - "Refuge Areas"
    optional_systems: []
    fire_resistance_rating: "120 minutes"
    max_travel_distance: 30
    escape_route_width: 1.5

  - code: "E"
    description: "Industrial & Manufacturing (Factories, warehouses)"
    life_safety_risk: "MEDIUM-HIGH"
    occupancy_load_factor: 50
    mandatory_systems:
      - "Manual Fire Alarm"
      - "Emergency Lighting"
      - "Fire Safety Signage"
      - "Fire Extinguishers"
    optional_systems:
